<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo1.jpg">
    <title>NoteNest - Sign Up</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<link rel="stylesheet" href="signUp.css">
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <div class="left">
            <h1>📚 NoteNest</h1>
            <h2>Organize • Learn • Grow</h2>
            <p>Your Notes. Your Future.</p>
        </div>
        <div class="right">
            <h2>Create Your Account😃</h2>
            <form>
                <input type="text" placeholder="👤 Full Name">
                <input type="email" placeholder="✉️ College Email">
                <input type="password" placeholder="🔒 Password">           
                
                <input type="password" placeholder="🔒 Confirm Password">
                <label><input type="checkbox"> I agree to <p>Terms</p> & Privacy <p>Policy</p></label>
                <button>Create Account</button>
                <p class="or">Or</p>
                <button><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/IOS_Google_icon.png">Sign Up with Google</button>
                <p>Already have an account? <a href="#">Login</a></p>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="signUp.js"></script>
</body>
    

</html>
